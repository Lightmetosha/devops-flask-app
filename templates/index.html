<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ app_name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f8ff;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 520px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 160px;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        button {
            padding: 12px 18px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 6px;
        }
        .primary {
            background: #3498db;
            color: white;
        }
        .secondary {
            background: #95a5a6;
            color: white;
        }
        .message {
            margin: 18px 0;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
        }
        .success { background: #eafaf1; color: #1e8449; }
        .warning { background: #fff8e1; color: #8a6d1d; }
        .error   { background: #fdecea; color: #c0392b; }
        .info    { background: #eaf2ff; color: #2c3e50; }
        .stats {
            margin-top: 18px;
            color: #555;
        }
        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: #888;
        }
        form {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Угадай число от 1 до 100</h1>

        {% if message %}
            <div class="message {{ message_type }}">
                {{ message }}
            </div>
        {% endif %}

        <form action="/guess" method="post">
            <input type="number" name="guess" min="1" max="100" required placeholder="Ваше число">
            <div>
                <button class="primary" type="submit">Проверить</button>
            </div>
        </form>

        <form action="/reset" method="post">
            <button class="secondary" type="submit">Новая игра</button>
        </form>

        <div class="stats">
            <p><strong>Попыток в текущей игре:</strong> {{ attempts }}</p>
            <p><strong>Лучший результат:</strong> {{ best_score }}</p>
        </div>

        <div class="footer">
            {{ app_name }}
        </div>
    </div>
</body>
</html>
